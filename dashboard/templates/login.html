<!DOCTYPE html>
<html>

<head>
    <title style="color: antiquewhite;">Login - Beast Dashboard</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2216%22>🐺</text></svg>">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f1117;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background-color: #111827;
            border: 1px solid #1f2937;
        }

        .form-control {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: white;
        }
    </style>
</head>

<body>
    <div class="card p-4" style="width: 400px;">
        <h3 class="text-center mb-4" style="color: antiquewhite;">🐺 Beast Login</h3>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="mb-3">
                <label class="form-label" style="color: antiquewhite;">Contraseña</label>
                <input type="password" name="password" class="form-control" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
    </div>
</body>

</html>
