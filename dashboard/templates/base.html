<!DOCTYPE html>
<html>

<head>
    <title>Beast Money Maker</title>
    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2216%22>🐺</text></svg>">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f1117;
        }

        .navbar {
            border-bottom: 1px solid #1f2937;
        }

        .card {
            border-radius: 14px;
            border: 1px solid #1f2937;
            background-color: #111827;
        }

        .nav-pills .nav-link {
            background: #1f2937;
            color: #9ca3af;
            border-radius: 10px;
            margin-right: 10px;
            transition: 0.2s ease;
        }

        .nav-pills .nav-link.active {
            background: #2563eb;
            color: white;
        }

        .nav-pills .nav-link:hover {
            background: #374151;
            color: white;
        }

        .form-control,
        .form-select {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: white;
        }

        .form-control:focus {
            background-color: #1f2937;
            color: white;
            border-color: #2563eb;
            box-shadow: none;
        }

        .btn-primary {
            background-color: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .toast-container {
            z-index: 2000;
        }

        .text-success {
            color: chartreuse !important;
        }

        /* Animación de fila al cerrarse */
        #performance tbody tr {
            transition: opacity 0.3s ease, background-color 0.2s ease;
        }

        #performance tbody tr:hover {
            background-color: #1f2937 !important;
        }

        /* Botón de close: hover effect */
        .btn-close-position {
            transition: transform 0.1s ease;
        }

        .btn-close-position:hover {
            transform: scale(1.05);
        }

        .btn-close-position:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .tab-pane {
            transition: opacity 0.15s ease-in-out;
        }

        /* Highlight visual en el botón del tab activo */
        .nav-pills .nav-link.active {
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.5);
        }

        /* Highlight para el día actual en el calendario */
        #calendar tbody tr.table-info {
            background-color: rgba(191, 226, 239, 0.15) !important;
        }

        /* Animación suave al cargar filas */
        #calendar tbody tr {
            transition: background-color 0.2s ease;
        }

        /* Tooltip para ver detalles al pasar el mouse */
        #calendar tbody tr:hover {
            background-color: #1f2937 !important;
            cursor: default;
        }
    </style>
</head>

<body class="text-light">

    <nav class="navbar navbar-dark bg-black px-3 justify-content-center">
        <span class="navbar-brand mb-0 h1">

        </span>

    <!--  SCRIPTS  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (() => {
            'use strict'

            const form = document.getElementById('configForm')
            const openConfirm = document.getElementById('openConfirm')
            const confirmSave = document.getElementById('confirmSave')
            const modal = new bootstrap.Modal(document.getElementById('confirmModal'))
            const toastEl = document.getElementById('mainToast')
            const toastMsg = document.getElementById('toastMessage')
            const toast = new bootstrap.Toast(toastEl)

            openConfirm.addEventListener('click', () => {
                if (!form.checkValidity()) {
                    form.classList.add('was-validated')
                    return
                }
                modal.show()
            })

            confirmSave.addEventListener('click', async () => {

                console.log("CLICK CONFIRM SAVE");

                try {

                    const formData = new FormData(form)
                    const data = {}

                    formData.forEach((value, key) => {
                        if (key === "symbols") {
                            data[key] = value.split(",").map(s => s.trim())
                        } else if (key === "paused") {
                            data[key] = document.getElementById("paused").checked
                        } else if (key === "paper_trading") {
                            data[key] = document.getElementById("paper_trading").checked
                        } else if (key === "trailing_automatico") {
                            data[key] = document.getElementById("trailing_automatico").checked
                        } else if (key === "adx_rising") {
                            data[key] = document.getElementById("adx_rising").checked
                        } else if (key === "timeframe") {
                            data[key] = value
                        } else if (key === "strategy_mode") {
                            data[key] = value
                        } else if (key === "pivot_len") {
                            data[key] = parseInt(value, 10)
                        } else {
                            data[key] = Number(value)
                        }
                    })

                    console.log("Payload enviado:", data);

                    const res = await fetch("/update-config", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    })

                    console.log("Status:", res.status);

                    const responseText = await res.text()
                    console.log("Response body:", responseText);

                    modal.hide()

                    if (res.ok) {
                        toastEl.classList.remove("text-bg-danger")
                        toastEl.classList.add("text-bg-success")
                        toastMsg.innerText = "Configuración actualizada correctamente"
                        toast.show()
                        setTimeout(() => location.reload(), 1500)
                    } else {
                        toastEl.classList.remove("text-bg-success")
                        toastEl.classList.add("text-bg-danger")
                        toastMsg.innerText = "Error: " + responseText
                        toast.show()
                    }

                } catch (error) {
                    console.error("ERROR EN FETCH:", error)
                    alert("Error JS: " + error.message)
                }

            })

        })()
    </script>

    <!-- ========================= CHARTS SCRIPT ========================= -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const equityData = {{ equity_curve | tojson }};
        const drawdownData = {{ drawdown_curve | tojson }};
        const maxDrawdown = {{ max_drawdown }};

        const labels = equityData.map(e => e.created_at);
        const equityValues = equityData.map(e => e.total_balance);
        // Mostrar equity actual arriba // 
        const currentEquity = equityValues.length ? equityValues[equityValues.length - 1] : 0;

        // ---------- EQUITY CHART ---------- //
        const equityCtx = document.getElementById("equityChart").getContext("2d");
        const equityGradient = equityCtx.createLinearGradient(0, 0, 0, 300);
        equityGradient.addColorStop(0, "rgba(0,255,0,0.35)");
        equityGradient.addColorStop(1, "rgba(0,255,0,0)");
        new Chart(equityCtx, { type: "line", data: { labels: labels, datasets: [{ data: equityValues, borderColor: "lime", backgroundColor: equityGradient, fill: true, tension: 0.35, pointRadius: 0, borderWidth: 2 }] }, options: { animation: { duration: 1200, easing: 'easeOutQuart' }, plugins: { legend: { display: false }, tooltip: { backgroundColor: "#111", borderColor: "lime", borderWidth: 1, callbacks: { label: ctx => "$" + ctx.parsed.y.toFixed(2) } } }, scales: { x: { ticks: { color: "#888" }, grid: { display: false } }, y: { ticks: { color: "#888", callback: value => "$" + value }, grid: { color: "rgba(255,255,255,0.04)" } } } } });

        // ---------- DRAWDOWN CHART ---------- //
        const drawdownCtx = document.getElementById("drawdownChart").getContext("2d");
        const drawdownGradient = drawdownCtx.createLinearGradient(0, 0, 0, 300);
        drawdownGradient.addColorStop(0, "rgba(255,0,0,0.4)");
        drawdownGradient.addColorStop(1, "rgba(255,0,0,0)");
        new Chart(drawdownCtx, { type: "line", data: { labels: labels, datasets: [{ data: drawdownData, borderColor: "red", backgroundColor: drawdownGradient, fill: true, tension: 0.35, pointRadius: 0, borderWidth: 2 }, { label: "Max DD", data: Array(labels.length).fill(maxDrawdown), borderColor: "rgba(255,0,0,0.6)", borderDash: [6, 6], pointRadius: 0, fill: false }] }, options: { animation: { duration: 1200, easing: 'easeOutQuart' }, plugins: { legend: { display: false }, tooltip: { backgroundColor: "#111", borderColor: "red", borderWidth: 1, callbacks: { label: ctx => ctx.parsed.y.toFixed(2) + "%" } } }, scales: { x: { ticks: { color: "#888" }, grid: { display: false } }, y: { reverse: true, ticks: { color: "#888", callback: value => value + "%" }, grid: { color: "rgba(255,0,0,0.05)" } } } } }); 
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startDate = document.getElementById('exportStartDate');
            const endDate = document.getElementById('exportEndDate');

            // No permitir fecha fin antes de fecha inicio
            startDate?.addEventListener('change', () => {
                if (endDate && startDate.value) {
                    endDate.min = startDate.value;
                }
            });

            endDate?.addEventListener('change', () => {
                if (startDate && endDate.value) {
                    startDate.max = endDate.value;
                }
            });

            // Por defecto: último mes
            const today = new Date().toISOString().split('T')[0];
            const lastMonth = new Date();
            lastMonth.setMonth(lastMonth.getMonth() - 1);
            const lastMonthStr = lastMonth.toISOString().split('T')[0];

            if (startDate) startDate.value = lastMonthStr;
            if (endDate) endDate.value = today;
        });
    </script>

    <script>
        async function updateStats() {
            try {
                const res = await fetch("/api/stats");
                if (!res.ok) return;

                const data = await res.json();

                // Daily PnL: Priorizar Binance si existe, sino fallback a DB
                const dailyPnlEl = document.getElementById("daily-pnl");
                if (dailyPnlEl) {
                    // ✅ Usar Binance value si existe, sino DB
                    const pnl = data.stats.daily_pnl_binance !== undefined
                        ? data.stats.daily_pnl_binance
                        : data.stats.daily_pnl;

                    dailyPnlEl.innerText = parseFloat(pnl).toFixed(2) + " USDT";
                    dailyPnlEl.className = pnl >= 0 ? "text-success" : "text-danger";
                }
                const badgeEl = document.getElementById("pnl-source-badge");
                if (badgeEl) {
                    if (data.stats.daily_pnl_binance !== undefined) {
                        badgeEl.innerText = "Binance Real";
                        badgeEl.className = "badge bg-success text-dark";
                    } else {
                        badgeEl.innerText = "DB Local";
                        badgeEl.className = "badge bg-warning text-dark";
                    }
                }

                // Equity
                const equityEl = document.getElementById("equity");
                if (equityEl && data.account) {
                    equityEl.innerText = parseFloat(data.account.equity).toFixed(2);
                }

                // Bot status
                const botEl = document.getElementById("bot-status");
                if (botEl) {
                    botEl.innerText = data.bot_status;
                }

            } catch (e) {
                console.error("Stats update failed", e);
            }
        }

        async function updateUnrealizedPnL() {
            try {
                const res = await fetch("/api/open-positions/pnl");
                if (!res.ok) return;

                const data = await res.json();

                // ✅ CORRECCIÓN: Desestructurar el objeto values correctamente
                Object.entries(data).forEach(([symbol, values]) => {
                    const { unrealized_pnl, mark_price, pnl_pct } = values;

                    // ✅ Actualizar Unrealized PnL
                    const pnlEl = document.getElementById(`pnl-${symbol}`);
                    if (pnlEl && unrealized_pnl !== undefined) {
                        const value = parseFloat(unrealized_pnl);
                        pnlEl.innerText = value.toFixed(2) + " USDT";
                        pnlEl.className = value >= 0 ? "text-success" : "text-danger";
                    }

                    // ✅ Actualizar Mark Price
                    const markEl = document.getElementById(`mark-${symbol}`);
                    if (markEl && mark_price !== undefined) {
                        const mark = parseFloat(mark_price);
                        markEl.innerText = mark.toFixed(4);
                    }

                    // ✅ Actualizar PnL %
                    const pctEl = document.getElementById(`pnlpct-${symbol}`);
                    if (pctEl && pnl_pct !== undefined) {
                        const pct = parseFloat(pnl_pct);
                        pctEl.innerText = pct.toFixed(2) + "%";
                        pctEl.className = pct >= 0 ? "text-success" : "text-danger";
                    }
                });

            } catch (e) {
                console.error("Unrealized update failed", e);
            }
        }

        setInterval(() => {
            updateStats();
            updateUnrealizedPnL();
            updateTrailingStatus();
            updateSymbolsStatus();
        }, 5000);
    </script>

    <script>
        async function updateHealth() {
            try {
                const res = await fetch("/api/health");
                if (!res.ok) return;
                const data = await res.json();
                const badge = document.getElementById("exchange-health");
                if (!badge) return;

                if (data.api_reachable) {
                    badge.className = "badge bg-success ms-3";
                    badge.innerText = "API OK - " + data.latency_ms + "ms";
                } else {
                    badge.className = "badge bg-danger ms-3";
                    badge.innerText = "API DOWN";
                }

            } catch {
                const badge = document.getElementById("exchange-health");
                if (badge) {
                    badge.className = "badge bg-danger ms-3";
                    badge.innerText = "API ERROR";
                }
            }
        }

        setInterval(updateHealth, 20000);
        updateHealth();
    </script>

    <script>
        async function updateTimeframe() {
            try {
                const res = await fetch("/api/timeframe");
                if (!res.ok) return;
                const data = await res.json();

                // Actualizar display del navbar
                const tfDisplay = document.getElementById("timeframe-display");
                if (tfDisplay) {
                    tfDisplay.innerText = data.timeframe_display;
                }

                // Actualizar badge en Configuración
                const tfBadge = document.getElementById("current-timeframe-badge");
                if (tfBadge) {
                    tfBadge.innerText = `Actual: ${data.timeframe_display}`;
                }

                // Opcional: Pre-seleccionar el timeframe actual en el select

    <script>
        document.getElementById('confirmExport')?.addEventListener('click', async () => {
            const startDate = document.getElementById('exportStartDate')?.value;
            const endDate = document.getElementById('exportEndDate')?.value;
            const symbol = document.getElementById('exportSymbol')?.value;

            // Construir query params
            const params = new URLSearchParams();
            params.append('format', 'csv');
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (symbol) params.append('symbol', symbol);

            // Feedback visual
            const btn = document.getElementById('confirmExport');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Generando...';
            btn.disabled = true;

            try {
                // Abrir en nueva pestaña para descargar
                window.open(`/api/export/trades?${params.toString()}`, '_blank');

                // Cerrar modal y resetear botón
                const modal = bootstrap.Modal.getInstance(document.getElementById('exportFiltersModal'));
                modal?.hide();

                // Toast de éxito
                showToast('✅ Exportación iniciada. Revisá tu carpeta de descargas.', 'success');

            } catch (e) {
                console.error('Export error:', e);
                showToast('❌ Error al exportar: ' + e.message, 'danger');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Helper para toasts (si no tenés uno ya)
        function showToast(message, type = 'info') {
            const toastEl = document.getElementById('mainToast');
            const toastMsg = document.getElementById('toastMessage');
            if (!toastEl || !toastMsg) return;

            toastEl.classList.remove('text-bg-success', 'text-bg-danger', 'text-bg-info', 'text-bg-warning');
            toastEl.classList.add(`text-bg-${type}`);
            toastMsg.innerText = message;

            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        // ============================================================
        // TRAILING STATUS
        // ============================================================
        async function updateTrailingStatus() {
            try {
                const res = await fetch("/api/trailing-status");
                if (!res.ok) return;
                const data = await res.json();
                
                if (!data.trailing) return;
                
                Object.entries(data.trailing).forEach(([symbol, info]) => {
                    const el = document.getElementById(`trailing-${symbol}`);
                    if (!el) return;
                    
                    if (info.activated) {
                        const best = info.best ? parseFloat(info.best).toFixed(2) : 'N/A';
                        const sl = info.sl ? parseFloat(info.sl).toFixed(2) : 'N/A';
                        el.innerHTML = `<span class="badge bg-success" title="Best: ${best}">🔒 ON</span>`;
                    } else {
                        el.innerHTML = `<span class="badge bg-secondary">OFF</span>`;
                    }
                });
            } catch (e) {
                console.error("Trailing status update failed", e);
            }
        }

        // ============================================================
        // SYMBOLS STATUS
        // ============================================================
        async function updateSymbolsStatus() {
            try {
                const res = await fetch("/api/symbols-status");
                if (!res.ok) return;
                const data = await res.json();
                
                // Ocultar loading, mostrar contenido
                const loading = document.getElementById('symbols-status-loading');
                const content = document.getElementById('symbols-status-content');
                if (loading) loading.style.display = 'none';
                if (content) content.style.display = 'block';
                
                const tableBody = document.getElementById('symbols-status-table');
                if (!tableBody) return;
                
                tableBody.innerHTML = data.symbols.map(sym => {
                    // Estado
                    let estado = '<span class="badge bg-secondary">Libre</span>';
                    if (sym.has_position) {
                        estado = '<span class="badge bg-success">Abierta</span>';
                    } else if (sym.in_cooldown) {
                        estado = '<span class="badge bg-warning">Cooldown</span>';
                    }
                    
                    // Posición
                    let posicion = '-';
                    if (sym.has_position) {
                        posicion = `<span class="badge bg-info">${sym.trail_sl ? 'SL: ' + parseFloat(sym.trail_sl).toFixed(2) : 'Sin SL'}</span>`;
                    }
                    
                    // Trailing
                    let trailing = '-';
                    if (sym.has_trailing) {
                        trailing = `<span class="badge bg-success">ON</span>`;
                    }
                    
                    // Cooldown
                    let cooldown = '-';
                    if (sym.in_cooldown && sym.remaining_cooldown > 0) {
                        cooldown = `<span class="badge bg-warning">${Math.ceil(sym.remaining_cooldown)}s</span>`;
                    }
                    
                    return `
                        <tr>
                            <td><strong>${sym.symbol}</strong></td>
                            <td>${estado}</td>
                            <td>${posicion}</td>
                            <td>${trailing}</td>
                            <td>${cooldown}</td>
                        </tr>
                    `;
                }).join('');
                
            } catch (e) {
                console.error("Symbols status update failed", e);
            }
        }

        // Inicializar status de símbolos al cargar
        document.addEventListener('DOMContentLoaded', () => {
            updateTrailingStatus();
            updateSymbolsStatus();
        });

        // Opcional: Limpiar filtros al cerrar modal
        document.getElementById('exportFiltersModal')?.addEventListener('hidden.bs.modal', () => {
            document.getElementById('exportFiltersForm')?.reset();
        });
    </script>

    <script>

        document.addEventListener('DOMContentLoaded', () => {
            initAnalyticsFilters();
        });

        function initAnalyticsFilters() {
            const startDate = document.getElementById('analyticsStartDate');
            const endDate = document.getElementById('analyticsEndDate');

            // Por defecto: último mes
            const today = new Date();
            const lastMonth = new Date();
            lastMonth.setMonth(lastMonth.getMonth() - 1);

            if (startDate) {
                startDate.value = lastMonth.toISOString().split('T')[0];
                startDate.max = today.toISOString().split('T')[0];
            }
            if (endDate) {
                endDate.value = today.toISOString().split('T')[0];
                endDate.min = lastMonth.toISOString().split('T')[0];
            }

            // Validación cruzada de fechas
            startDate?.addEventListener('change', () => {
                if (endDate && startDate.value) {
                    endDate.min = startDate.value;
                    if (endDate.value < startDate.value) {
                        endDate.value = startDate.value;
                    }
                }
            });

            endDate?.addEventListener('change', () => {
                if (startDate && endDate.value) {
                    startDate.max = endDate.value;
                    if (startDate.value > endDate.value) {
                        startDate.value = endDate.value;
                    }
                }
            });

            // Cargar símbolos únicos para el dropdown
            loadAnalyticsSymbols();
        }

        async function loadAnalyticsSymbols() {
            try {
                // Usamos el endpoint sin filtros para obtener todos los símbolos
                const res = await fetch('/api/analytics');
                if (!res.ok) return;
                const data = await res.json();

                const symbolSelect = document.getElementById('analyticsSymbol');
                if (!symbolSelect) return;

                // Guardar opción "Todos"
                const allOption = symbolSelect.querySelector('option[value=""]');
                symbolSelect.innerHTML = '';
                if (allOption) symbolSelect.appendChild(allOption);

                // Agregar símbolos únicos ordenados
                const symbols = [...new Set(data.analytics.map(a => a.symbol))].sort();
                symbols.forEach(sym => {
                    const opt = document.createElement('option');
                    opt.value = sym;
                    opt.textContent = sym;
                    symbolSelect.appendChild(opt);
                });
            } catch (e) {
                console.error('Error loading symbols:', e);
            }
        }

        async function applyAnalyticsFilters() {
            const startDate = document.getElementById('analyticsStartDate')?.value;
            const endDate = document.getElementById('analyticsEndDate')?.value;
            const symbol = document.getElementById('analyticsSymbol')?.value;

            // Construir query params
            const params = new URLSearchParams();
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (symbol) params.append('symbol', symbol);

            // Mostrar estado de carga
            const statusEl = document.getElementById('analyticsFilterStatus');
            const tableBody = document.getElementById('analyticsTableBody');
            const noResultsEl = document.getElementById('analyticsNoResults');

            if (statusEl) statusEl.innerText = 'Cargando...';
            if (tableBody) tableBody.innerHTML = '<tr><td colspan="6" class="text-center">Cargando datos...</td></tr>';
            if (noResultsEl) noResultsEl.style.display = 'none';

            try {
                const res = await fetch(`/api/analytics?${params.toString()}`);
                if (!res.ok) throw new Error('Error en la respuesta');

                const data = await res.json();
                renderAnalyticsTable(data.analytics);

                // Actualizar estado
                if (statusEl) {
                    const count = data.analytics.length;
                    const symbolText = symbol ? ` | Símbolo: ${symbol}` : '';
                    statusEl.innerText = `${count} resultado(s)${symbolText}`;
                }

            } catch (e) {
                console.error('Error applying filters:', e);
                if (statusEl) statusEl.innerText = 'Error al cargar';
                if (tableBody) tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error al cargar datos</td></tr>';
            }
        }

        function renderAnalyticsTable(analytics) {
            const tableBody = document.getElementById('analyticsTableBody');
            const noResultsEl = document.getElementById('analyticsNoResults');

            if (!tableBody) return;

            if (!analytics || analytics.length === 0) {
                tableBody.innerHTML = '';
                if (noResultsEl) noResultsEl.style.display = 'block';
                return;
            }

            if (noResultsEl) noResultsEl.style.display = 'none';

            tableBody.innerHTML = analytics.map(row => {
                const pnlClass = row.total_pnl >= 0 ? 'text-success' : 'text-danger';
                const bestClass = row.best_trade >= 0 ? 'text-success' : 'text-danger';
                const worstClass = row.worst_trade >= 0 ? 'text-success' : 'text-danger';

                return `
            <tr>
                <td>${row.symbol}</td>
                <td>${row.total_trades}</td>
                <td class="${pnlClass}">${row.total_pnl.toFixed(2)}</td>
                <td class="${bestClass}">${row.best_trade.toFixed(2)}</td>
                <td class="${worstClass}">${row.worst_trade.toFixed(2)}</td>
                <td>${row.avg_hold_hours.toFixed(2)}</td>
            </tr>
        `;
            }).join('');
        }

        function resetAnalyticsFilters() {
            const startDate = document.getElementById('analyticsStartDate');
            const endDate = document.getElementById('analyticsEndDate');
            const symbol = document.getElementById('analyticsSymbol');
            const statusEl = document.getElementById('analyticsFilterStatus');

            // Resetear a valores por defecto (último mes)
            const today = new Date();
            const lastMonth = new Date();
            lastMonth.setMonth(lastMonth.getMonth() - 1);

            if (startDate) startDate.value = lastMonth.toISOString().split('T')[0];
            if (endDate) endDate.value = today.toISOString().split('T')[0];
            if (symbol) symbol.value = '';
            if (statusEl) statusEl.innerText = '';

            // Recargar datos sin filtros
            applyAnalyticsFilters();
        }
    </script>

    <script>
        // ============================================================
        // PERFORMANCE FILTERS
        // ============================================================

        document.addEventListener('DOMContentLoaded', () => {
            initPerformanceFilters();
        });

        function initPerformanceFilters() {
            const startDate = document.getElementById('performanceStartDate');
            const endDate = document.getElementById('performanceEndDate');

            // Por defecto: último mes
            const today = new Date();
            const lastMonth = new Date();
            lastMonth.setMonth(lastMonth.getMonth() - 1);

            if (startDate) {
                startDate.value = lastMonth.toISOString().split('T')[0];
                startDate.max = today.toISOString().split('T')[0];
            }
            if (endDate) {
                endDate.value = today.toISOString().split('T')[0];
                endDate.min = lastMonth.toISOString().split('T')[0];
            }

            // Validación cruzada de fechas
            startDate?.addEventListener('change', () => {
                if (endDate && startDate.value) {
                    endDate.min = startDate.value;
                    if (endDate.value < startDate.value) {
                        endDate.value = startDate.value;
                    }
                }
            });

            endDate?.addEventListener('change', () => {
                if (startDate && endDate.value) {
                    startDate.max = endDate.value;
                    if (startDate.value > endDate.value) {
                        startDate.value = endDate.value;
                    }
                }
            });

            // Cargar símbolos únicos para el dropdown
            loadPerformanceSymbols();
        }

        async function loadPerformanceSymbols() {
            try {
                const res = await fetch('/api/closed-positions?limit=1000');
                if (!res.ok) return;
                const data = await res.json();

                const symbolSelect = document.getElementById('performanceSymbol');
                if (!symbolSelect) return;

                // Guardar opción "Todos"
                const allOption = symbolSelect.querySelector('option[value=""]');
                symbolSelect.innerHTML = '';
                if (allOption) symbolSelect.appendChild(allOption);

                // Agregar símbolos únicos ordenados
                const symbols = [...new Set(data.positions.map(p => p.symbol))].sort();
                symbols.forEach(sym => {
                    const opt = document.createElement('option');
                    opt.value = sym;
                    opt.textContent = sym;
                    symbolSelect.appendChild(opt);
                });
            } catch (e) {
                console.error('Error loading symbols:', e);
            }
        }

        async function applyPerformanceFilters() {
            const startDate = document.getElementById('performanceStartDate')?.value;
            const endDate = document.getElementById('performanceEndDate')?.value;
            const symbol = document.getElementById('performanceSymbol')?.value;

            // Construir query params
            const params = new URLSearchParams();
            params.append('limit', '100');
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (symbol) params.append('symbol', symbol);

            // Mostrar estado de carga
            const statusEl = document.getElementById('performanceFilterStatus');
            const tableBody = document.getElementById('closedPositionsTableBody');
            const noResultsEl = document.getElementById('performanceNoResults');

            if (statusEl) statusEl.innerText = 'Cargando...';
            if (tableBody) tableBody.innerHTML = '<tr><td colspan="6" class="text-center">Cargando datos...</td></tr>';
            if (noResultsEl) noResultsEl.style.display = 'none';

            try {
                const res = await fetch(`/api/closed-positions?${params.toString()}`);
                if (!res.ok) throw new Error('Error en la respuesta');

                const data = await res.json();
                renderPerformanceTable(data.positions);

                // Actualizar estado
                if (statusEl) {
                    const count = data.positions.length;
                    const symbolText = symbol ? ` | Símbolo: ${symbol}` : '';
                    statusEl.innerText = `${count} resultado(s)${symbolText}`;
                }

            } catch (e) {
                console.error('Error applying filters:', e);
                if (statusEl) statusEl.innerText = 'Error al cargar';
                if (tableBody) tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error al cargar datos</td></tr>';
            }
        }

        function renderPerformanceTable(positions) {
            const tableBody = document.getElementById('closedPositionsTableBody');
            const noResultsEl = document.getElementById('performanceNoResults');

            if (!tableBody) return;

            if (!positions || positions.length === 0) {
                tableBody.innerHTML = '';
                if (noResultsEl) noResultsEl.style.display = 'block';
                return;
            }

            if (noResultsEl) noResultsEl.style.display = 'none';

            tableBody.innerHTML = positions.map(pos => {
                const pnlClass = pos.realized_pnl >= 0 ? 'text-success' : 'text-danger';

                return `
            <tr>
                <td>${pos.symbol}</td>
                <td>${pos.side}</td>
                <td>${pos.entry_price}</td>
                <td>${pos.exit_price}</td>
                <td class="${pnlClass}">${pos.realized_pnl.toFixed(2)}</td>
                <td class="text-warning">-$${pos.commission.toFixed(4)}</td>
            </tr>
        `;
            }).join('');
        }

        function resetPerformanceFilters() {
            const startDate = document.getElementById('performanceStartDate');
            const endDate = document.getElementById('performanceEndDate');
            const symbol = document.getElementById('performanceSymbol');
            const statusEl = document.getElementById('performanceFilterStatus');

            // Resetear a valores por defecto (último mes)
            const today = new Date();
            const lastMonth = new Date();
            lastMonth.setMonth(lastMonth.getMonth() - 1);

            if (startDate) startDate.value = lastMonth.toISOString().split('T')[0];
            if (endDate) endDate.value = today.toISOString().split('T')[0];
            if (symbol) symbol.value = '';
            if (statusEl) statusEl.innerText = '';

            // Recargar datos sin filtros
            applyPerformanceFilters();
        }
    </script>

    <script>
        // ============================================================
        // CLOSE POSITION HANDLER
        // ============================================================
        let pendingCloseSymbol = null;

        function confirmClosePosition(symbol) {
            pendingCloseSymbol = symbol;
            document.getElementById('closeSymbol').innerText = symbol;

            const modal = new bootstrap.Modal(document.getElementById('closeConfirmModal'));
            modal.show();
        }

        document.getElementById('confirmCloseBtn')?.addEventListener('click', async () => {
            if (!pendingCloseSymbol) return;

            const symbol = pendingCloseSymbol;
            const modal = bootstrap.Modal.getInstance(document.getElementById('closeConfirmModal'));
            const btn = document.getElementById('confirmCloseBtn');

            // Feedback visual
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Cerrando...';

            try {
                const res = await fetch(`/api/positions/${symbol}/close`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await res.json();

                if (res.ok) {
                    // Remover fila
                    const row = document.getElementById(`row-${symbol}`);
                    if (row) {
                        row.style.opacity = '0';
                        setTimeout(() => row.remove(), 300);
                    }
                    showToast(`✅ ${symbol} cerrada correctamente`, 'success');
                    updateStats();
                    modal.hide();
                } else {
                    showToast(`❌ Error: ${data.detail}`, 'danger');
                }
            } catch (e) {
                showToast(`❌ Error: ${e.message}`, 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-x-circle"></i> Sí, cerrar posición';
                pendingCloseSymbol = null;
            }
        });

        // Resetear al cerrar modal
        document.getElementById('closeConfirmModal')?.addEventListener('hidden.bs.modal', () => {
            pendingCloseSymbol = null;
        });
    </script>

    <!-- ================= TAB PERSISTENCE ================= -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const TAB_STORAGE_KEY = 'beast_dashboard_active_tab';

            // ✅ 1. Restaurar tab al cargar la página
            const savedTab = localStorage.getItem(TAB_STORAGE_KEY);
            if (savedTab) {
                // Buscar el botón del tab guardado
                const tabButton = document.querySelector(`[data-bs-target="${savedTab}"]`);
                if (tabButton) {
                    // Usar Bootstrap 5 API para activar el tab
                    const tab = new bootstrap.Tab(tabButton);
                    tab.show();
                }
            }

            // ✅ 2. Guardar tab cuando el usuario cambia
            const tabButtons = document.querySelectorAll('[data-bs-toggle="pill"]');
            tabButtons.forEach(button => {
                button.addEventListener('shown.bs.tab', (event) => {
                    const target = event.target.getAttribute('data-bs-target');
                    if (target) {
                        localStorage.setItem(TAB_STORAGE_KEY, target);
                    }
                });
            });
        });
    </script>

    <script>
        // ============================================================
        // CALENDAR TAB
        // ============================================================

        // Cargar calendario al iniciar si el tab está activo
        document.addEventListener('DOMContentLoaded', () => {
            // Si el tab de calendario es el activo, cargar datos
            const calendarTab = document.querySelector('[data-bs-target="#calendar"]');
            calendarTab?.addEventListener('shown.bs.tab', () => {
                loadCalendar();
            });

            // Cargar datos cuando cambia el selector de días
            document.getElementById('calendarDays')?.addEventListener('change', loadCalendar);

            // Cargar por defecto (últimos 30 días)
            loadCalendar();
        });

        async function loadCalendar() {
            const days = document.getElementById('calendarDays')?.value || 30;
            const statusEl = document.getElementById('calendarStatus');
            const tableBody = document.getElementById('calendarTableBody');
            const noDataEl = document.getElementById('calendarNoData');

            // Feedback visual
            if (statusEl) statusEl.innerText = 'Cargando...';
            if (tableBody) tableBody.innerHTML = '<tr><td colspan="5" class="text-center">Cargando datos...</td></tr>';
            if (noDataEl) noDataEl.style.display = 'none';

            try {
                const res = await fetch(`/api/daily-pnl?days=${days}`);
                if (!res.ok) throw new Error('Error en la respuesta');

                const data = await res.json();
                renderCalendar(data.daily_pnl, data.summary);

                if (statusEl) {
                    statusEl.innerText = `${data.daily_pnl.length} días cargados`;
                }

            } catch (e) {
                console.error('Calendar load failed:', e);
                if (statusEl) statusEl.innerText = 'Error al cargar';
                if (tableBody) tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error al cargar datos</td></tr>';
            }
        }

        function renderCalendar(dailyPnl, summary) {
            const tableBody = document.getElementById('calendarTableBody');
            const noDataEl = document.getElementById('calendarNoData');

            if (!tableBody) return;

            // Mostrar mensaje si no hay datos
            if (!dailyPnl || dailyPnl.length === 0) {
                tableBody.innerHTML = '';
                if (noDataEl) noDataEl.style.display = 'block';
                return;
            }

            if (noDataEl) noDataEl.style.display = 'none';

            // Renderizar filas
            tableBody.innerHTML = dailyPnl.map(day => {
                const pnlClass = day.pnl_usdt >= 0 ? 'text-success' : 'text-danger';
                const pctClass = day.pnl_pct >= 0 ? 'text-success' : 'text-danger';
                const isToday = day.date === new Date().toISOString().split('T')[0];
                const rowClass = isToday ? 'table-info' : '';

                return `
            <tr class="${rowClass}">
                <td>
                    <strong>${day.date}</strong>
                    ${isToday ? '<span class="badge bg-primary ms-1">Hoy</span>' : ''}
                </td>
                <td>${day.trades}</td>
                <td>${day.wins} <small class="text-muted" style="color: rgb(215, 212, 10) !important;">(${day.trades > 0 ? Math.round(day.wins / day.trades * 100) : 0}%)</small></td>
                <td class="${pnlClass} fw-bold">${day.pnl_usdt >= 0 ? '+' : ''}${day.pnl_usdt.toFixed(2)}</td>
                <td class="${pctClass}">${day.pnl_pct >= 0 ? '+' : ''}${day.pnl_pct.toFixed(2)}%</td>
            </tr>
        `;
            }).join('');

            // Actualizar resumen
            if (summary) {
                const totalPnlEl = document.getElementById('summaryTotalPnl');
                const tradesEl = document.getElementById('summaryTrades');
                const winRateEl = document.getElementById('summaryWinRate');
                const avgPnlEl = document.getElementById('summaryAvgPnl');

                if (totalPnlEl) {
                    totalPnlEl.innerText = `$${summary.total_pnl.toFixed(2)}`;
                    totalPnlEl.className = summary.total_pnl >= 0 ? 'text-success' : 'text-danger';
                }
                if (tradesEl) tradesEl.innerText = summary.total_trades;
                if (winRateEl) winRateEl.innerText = `${summary.win_rate}%`;
                if (avgPnlEl) {
                    avgPnlEl.innerText = `$${summary.avg_pnl_per_day.toFixed(2)}`;
                    avgPnlEl.className = summary.avg_pnl_per_day >= 0 ? 'text-success' : 'text-danger';
                }
            }
        }
    </script>

    <script>
        setTimeout(() => {
            location.reload();
        }, 150000);
    </script>
